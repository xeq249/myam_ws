# ROS 1 Noetic: matches roarm_description joint names; EffortJointInterface in URDF transmissions
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 30

arm_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - base_link_to_link1
    - link1_to_link2
    - link2_to_link3
    - link3_to_link4
    - link4_to_link5
  gains:
    base_link_to_link1: {p: 10.0, i: 0.0, d: 0.01, i_clamp: 0.0}
    link1_to_link2: {p: 10.0, i: 0.0, d: 0.01, i_clamp: 0.0}
    link2_to_link3: {p: 10.0, i: 0.0, d: 0.01, i_clamp: 0.0}
    link3_to_link4: {p: 4.0, i: 0.0, d: 0.004, i_clamp: 0.0}
    link4_to_link5: {p: 3.0, i: 0.0, d: 0.003, i_clamp: 0.0}

gripper_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - link5_to_gripper_link
  gains:
    link5_to_gripper_link: {p: 1.0, i: 0.0, d: 0.001, i_clamp: 0.0}
