# 备用：恢复 KDL 时将本文件内容拷入 kinematics.yaml，或改 planning_context 加载路径
arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.012
  kinematics_solver_attempts: 8
  kinematics_solver_timeout: 0.15
  goal_joint_tolerance: 0.12
  goal_position_tolerance: 0.032
  goal_orientation_tolerance: 0.35
