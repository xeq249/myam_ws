joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 40

arm_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - base_link_to_link1
    - link1_to_link2
    - link2_to_link3
    - link3_to_link4
    - link4_to_link5
  constraints:
    goal_time: 60.0
    stopped_velocity_tolerance: 0.4
    # 肩/肘大伸展段 effort 跟踪易超 0.4 rad → PATH_TOLERANCE_VIOLATED → MoveIt CONTROL_FAILED（offboard 视觉长段）
    base_link_to_link1: {trajectory: 0.65, goal: 0.22}
    link1_to_link2: {trajectory: 0.65, goal: 0.22}
    link2_to_link3: {trajectory: 0.55, goal: 0.18}
    # effort 跟踪大伸展轨迹时易超 0.4 rad path 容差 → PATH_TOLERANCE_VIOLATED；略放宽 elbow 段
    link3_to_link4: {trajectory: 0.65, goal: 0.22}
    link4_to_link5: {trajectory: 0.65, goal: 0.22}
  gains:
    base_link_to_link1: {p: 1.8, i: 0.0, d: 0.00, i_clamp: 0.0}
    link1_to_link2: {p: 2.2, i: 0.0, d: 0.00, i_clamp: 0.0}
    link2_to_link3: {p: 1.8, i: 0.0, d: 0.00, i_clamp: 0.0}
    link3_to_link4: {p: 1.0, i: 0.0, d: 0.00, i_clamp: 0.0}
    link4_to_link5: {p: 0.2, i: 0.0, d: 0.00, i_clamp: 0.0}
gripper_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - link5_to_gripper_link
  constraints:
    goal_time: 60.0
    stopped_velocity_tolerance: 0.4
    link5_to_gripper_link: {trajectory: 0.4, goal: 0.15}
  gains:
    link5_to_gripper_link: {p: 0.1, i: 0.0, d: 0.00, i_clamp: 0.0}
