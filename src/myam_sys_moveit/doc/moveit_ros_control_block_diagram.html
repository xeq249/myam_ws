<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>MoveIt 与 ros_control（机械臂）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Noto Sans SC", sans-serif;
      background: #fafbfc;
      color: #1a1a1a;
      margin: 0;
      padding: 28px 20px 40px;
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 6px; }
    .sub { font-size: 0.85rem; color: #555; margin-bottom: 20px; max-width: 640px; }
    .diagram {
      background: #fff;
      border: 1px solid #e2e4e8;
      border-radius: 8px;
      padding: 20px 16px 24px;
      max-width: 720px;
    }
    svg { display: block; width: 100%; height: auto; }
    .box { stroke-width: 1.2; }
    .m { fill: #e8f4fc; stroke: #1565a8; }
    .r { fill: #f3eef8; stroke: #6b4c9a; }
    .title { font-size: 12px; font-weight: 700; }
    .txt { font-size: 10.5px; }
    .small { font-size: 8.5px; fill: #555; }
    .arrow { fill: none; stroke: #333; stroke-width: 1.1; }
    .arrow.action { stroke: #1565a8; stroke-width: 1.3; }
    .action-lbl { font-size: 9px; fill: #1565a8; font-weight: 600; }
    .feed-lbl { font-size: 8.5px; fill: #2d4a2d; }
  </style>
</head>
<body>
  <h1>MoveIt 与 ros_control（机械臂链路）</h1>
  <p class="sub">仅含二者接口：规划与轨迹执行在 MoveIt；<code>controller_manager</code> 中 <code>arm_controller</code> / <code>gripper_controller</code> 响应 <code>FollowJointTrajectory</code>。关节状态经 <code>joint_state_controller</code> 供 MoveIt 同步当前位形。</p>

  <div class="diagram">
    <svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="end" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#333" />
        </marker>
        <marker id="endB" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#1565a8" />
        </marker>
        <marker id="endG" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#2d6a3a" />
        </marker>
      </defs>

      <rect class="box m" x="32" y="40" width="200" height="100" rx="4"/>
      <text class="title" x="42" y="62" fill="#111">MoveIt</text>
      <text class="txt" x="42" y="82" fill="#333">move_group</text>
      <text class="small" x="42" y="100">MoveItControllerManager (ros_control 插件)</text>
      <text class="small" x="42" y="116">trajectory execution → 下发关节轨迹</text>
      <text class="small" x="42" y="132">规划场景需当前 /joint_states</text>

      <rect class="box r" x="400" y="30" width="252" height="120" rx="4"/>
      <text class="title" x="410" y="50" fill="#111">ros_control</text>
      <text class="txt" x="410" y="70" fill="#333">controller_manager</text>
      <text class="txt" x="410" y="88" fill="#333">· arm_controller（5 关节臂）</text>
      <text class="txt" x="410" y="104" fill="#333">· gripper_controller（夹爪）</text>
      <text class="txt" x="410" y="120" fill="#333">· joint_state_controller</text>
      <text class="small" x="410" y="138">类型见 gazebo_controllers.yaml</text>

      <path class="arrow action" d="M 238 90 L 388 90" marker-end="url(#endB)"/>
      <text class="action-lbl" x="268" y="80">Action: follow_joint_trajectory</text>
      <text class="small" x="268" y="95" fill="#555">（臂与夹爪各一控制器）</text>

      <path class="arrow" d="M 400 150 L 140 150" fill="none" stroke="#2d6a3a" stroke-width="1.1" marker-end="url(#endG)"/>
      <text class="feed-lbl" x="220" y="142" text-anchor="middle">/joint_states（关节状态反馈）</text>
    </svg>
  </div>
  <p class="sub" style="margin-top:16px;">截图：全页缩放至清晰后截屏，或打印为 PDF。</p>
</body>
</html>
